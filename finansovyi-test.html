<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фінансовий тест для власника бізнесу</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2e;
    --navy-mid: #132440;
    --navy-card: #1a2f4a;
    --gold: #c9a227;
    --gold-light: #e2b93b;
    --gold-pale: rgba(201,162,39,0.12);
    --white: #ffffff;
    --text-muted: #8ba0bb;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --correct-bg: rgba(46,204,113,0.12);
    --wrong-bg: rgba(231,76,60,0.12);
  }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* COVER */
  #cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
    background: radial-gradient(ellipse at 50% 0%, #1e3a5f 0%, var(--navy) 65%);
  }

  .cover-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 2px;
    margin-bottom: 32px;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--white);
    max-width: 700px;
    margin-bottom: 16px;
  }

  .cover-title span { color: var(--gold); }

  .cover-sub {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 480px;
    margin-bottom: 48px;
  }

  .cover-meta {
    display: flex;
    gap: 32px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cover-meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .cover-meta-item .num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
  }

  .cover-meta-item .label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-start {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 16px 48px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-start:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  /* QUIZ */
  #quiz { display: none; max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }

  .progress-bar-wrap {
    height: 3px;
    background: var(--navy-mid);
    border-radius: 2px;
    margin-bottom: 36px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .q-counter {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 700;
    line-height: 1.3;
    color: var(--white);
    margin-bottom: 32px;
    min-height: 80px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 20px;
    border: 1.5px solid rgba(139,160,187,0.2);
    border-radius: 6px;
    background: var(--navy-card);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--gold);
    background: var(--gold-pale);
  }

  .option.disabled { cursor: default; }

  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }

  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .opt-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(139,160,187,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    transition: background 0.2s, color 0.2s;
  }

  .option.correct .opt-letter { background: var(--correct); color: #fff; }
  .option.wrong .opt-letter { background: var(--wrong); color: #fff; }

  .opt-text { font-size: 15px; color: var(--white); line-height: 1.5; padding-top: 3px; }

  .feedback-box {
    display: none;
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.6;
  }

  .feedback-box.correct-fb {
    background: var(--correct-bg);
    border-left: 3px solid var(--correct);
    color: #a8f0c6;
  }

  .feedback-box.wrong-fb {
    background: var(--wrong-bg);
    border-left: 3px solid var(--wrong);
    color: #f5b7b1;
  }

  .feedback-label {
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .btn-next {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 36px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: none;
  }

  .btn-next:hover { background: var(--gold); color: var(--navy); }

  /* RESULTS */
  #results {
    display: none;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    text-align: center;
  }

  .result-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 2px;
    margin-bottom: 28px;
  }

  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: clamp(60px, 15vw, 100px);
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .result-score-sub {
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 12px;
    margin-top: 8px;
  }

  .result-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
  }

  .result-desc {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 480px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .topics-section { text-align: left; margin-bottom: 40px; }

  .topics-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .topic-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(139,160,187,0.1);
    font-size: 14px;
  }

  .topic-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .topic-dot.ok { background: var(--correct); }
  .topic-dot.bad { background: var(--wrong); }

  .btn-retry {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 44px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-retry:hover { background: var(--gold-light); }

  @media (max-width: 480px) {
    .cover-meta { gap: 20px; }
    #quiz { padding: 28px 16px 60px; }
  }
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-badge">Курс · Фінансовий директор для власника</div>
  <h1 class="cover-title">Фінансовий<br><span>тест</span></h1>
  <p class="cover-sub">Перевірте, наскільки добре ви засвоїли ключові фінансові концепції курсу</p>
  <div class="cover-meta">
    <div class="cover-meta-item"><span class="num">10</span><span class="label">Питань</span></div>
    <div class="cover-meta-item"><span class="num">~5</span><span class="label">Хвилин</span></div>
    <div class="cover-meta-item"><span class="num">4</span><span class="label">Варіанти</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Розпочати тест</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="q-counter" id="qCounter">Питання 1 / 10</div>
  <div class="q-text" id="qText"></div>
  <div class="options" id="optionsContainer"></div>
  <div class="feedback-box" id="feedbackBox">
    <div class="feedback-label" id="feedbackLabel"></div>
    <div id="feedbackText"></div>
  </div>
  <button class="btn-next" id="btnNext" onclick="nextQuestion()">Далі →</button>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="result-badge">Результат тесту</div>
  <div class="result-score" id="resScore">0</div>
  <div class="result-score-sub" id="resScoreSub">з 10 правильних відповідей</div>
  <h2 class="result-headline" id="resHeadline"></h2>
  <p class="result-desc" id="resDesc"></p>
  <div class="topics-section">
    <div class="topics-title">Деталі по темам</div>
    <div id="topicsList"></div>
  </div>
  <button class="btn-retry" onclick="retryQuiz()">Спробувати ще раз</button>
</div>

<script>
const questions = [
  {
    q: "Чому чистий прибуток у звіті P&L зазвичай не збігається із залишком грошових коштів на рахунках компанії?",
    topic: "Фінансова звітність (P&L, Cash Flow, Баланс)",
    options: [
      { letter: "A", text: "Тому що прибуток — це віртуальний показник, який існує лише для звітності перед податковими органами.", feedback: "Прибуток є реальним економічним показником ефективності, але він відображає приріст капіталу, а не поточну ліквідність.", correct: false },
      { letter: "B", text: "Це відбувається тільки у випадку наявності касового розриву або помилок бухгалтера.", feedback: "Навіть у ідеально працюючому бізнесі прибуток і грошовий потік розходяться через капітальні інвестиції та зміни в оборотному капіталі.", correct: false },
      { letter: "C", text: "Оскільки гроші на рахунку включають лише власний капітал власника, а прибуток — це кошти компанії.", feedback: "Гроші на рахунку можуть належати компанії, але бути запозиченими або призначеними для майбутніх виплат кредиторам.", correct: false },
      { letter: "D", text: "Через різницю між моментом нарахування доходів/витрат та моментом фактичного руху грошей (дебіторка, кредиторка, амортизація).", feedback: "✓ Управлінський облік базується на методі нарахування, де операції фіксуються в момент виникнення зобов'язань, а не лише при фізичному русі коштів.", correct: true }
    ]
  },
  {
    q: "Який показник найкраще демонструє операційну ефективність бізнесу, ігноруючи вплив структури капіталу, податків та амортизації?",
    topic: "Показники ефективності (EBITDA, ROIC)",
    options: [
      { letter: "A", text: "Валовий прибуток", feedback: "Він враховує лише собівартість реалізації, не беручи до уваги адміністративні та маркетингові витрати, які є критичними для операційної оцінки.", correct: false },
      { letter: "B", text: "ROE", feedback: "Цей коефіцієнт показує рентабельність лише власного капіталу, а не загальну операційну ефективність бізнесу.", correct: false },
      { letter: "C", text: "EBITDA", feedback: "✓ Цей показник дозволяє порівнювати компанії з різною кредитною історією та податковим навантаженням, фокусуючись на прибутковості основної діяльності.", correct: true },
      { letter: "D", text: "Чистий прибуток", feedback: "На цей показник суттєво впливають відсотки за кредитами та податки, що може викривити реальну картину ефективності процесів.", correct: false }
    ]
  },
  {
    q: "За якої умови бізнесу доцільно залучати кредитні кошти для масштабування, згідно з правилом вартості капіталу?",
    topic: "Показники ефективності (EBITDA, ROIC)",
    options: [
      { letter: "A", text: "ROIC > вартість кредиту", feedback: "✓ Якщо рентабельність інвестованого капіталу вища за вартість його залучення, кожен залучений долар створює додаткову вартість для власника.", correct: true },
      { letter: "B", text: "Якщо ставка кредитування нижча за офіційний рівень інфляції в країні.", feedback: "Інфляція не є головним критерієм; головне — чи зможе бізнес згенерувати прибуток, що перевищує відсотки банку.", correct: false },
      { letter: "C", text: "Коли залишок грошей на рахунку (CashFlow) менший за місячний виторг.", feedback: "Це ознака браку ліквідності, а залучення кредиту в такій ситуації може бути небезпечним «латанням дірок» без розуміння окупності.", correct: false },
      { letter: "D", text: "EBITDA Margin > 20%", feedback: "Висока маржинальність не гарантує здатності обслуговувати борг, якщо ефективність використання всього капіталу є низькою.", correct: false }
    ]
  },
  {
    q: "Що таке «точка беззбитковості» (BEP) у контексті управління витратами?",
    topic: "Управлінський облік та бюджетування",
    options: [
      { letter: "A", text: "Рівень доходу, після якого компанія перестає платити податок на додану вартість.", feedback: "Податковий статус не залежить від концепції покриття постійних витрат маржинальним доходом.", correct: false },
      { letter: "B", text: "Ситуація, коли дебіторська заборгованість дорівнює кредиторській заборгованості.", feedback: "Це стан балансу зобов'язань, який не має прямого відношення до прибутковості поточної діяльності.", correct: false },
      { letter: "C", text: "Обсяг продажу, при якому маржинальний прибуток повністю покриває всі постійні витрати компанії.", feedback: "✓ У цій точці операційний прибуток дорівнює нулю, і кожен наступний продаж починає формувати прибуток для бізнесу.", correct: true },
      { letter: "D", text: "Момент часу, коли засновник повністю повернув свої початкові інвестиції в бізнес.", feedback: "Це визначення терміну окупності (Payback Period), а не операційної точки беззбитковості.", correct: false }
    ]
  },
  {
    q: "Який термін планування є рекомендованим для оперативного платіжного календаря, щоб вчасно виявляти касові розриви?",
    topic: "Управлінський облік та бюджетування",
    options: [
      { letter: "A", text: "12 місяців", feedback: "На такий тривалий термін важко спланувати точні дати щоденних платежів — це горизонт для бюджету, а не платіжного календаря.", correct: false },
      { letter: "B", text: "3 роки", feedback: "Це горизонт стратегічного планування, де оперують великими цифрами, а не конкретними датами оплат постачальникам.", correct: false },
      { letter: "C", text: "13 тижнів", feedback: "✓ Цей період охоплює один квартал і дозволяє детально бачити всі надходження та виплати, враховуючи типові бізнес-цикли.", correct: true },
      { letter: "D", text: "30 днів", feedback: "Одного місяця зазвичай недостатньо, щоб побачити накопичувальний ефект дефіциту коштів від довгострокових зобов'язань.", correct: false }
    ]
  },
  {
    q: "Який звіт дає відповідь на питання: «Скільки грошей нам винні клієнти, і чи є серед них критичні затримки»?",
    topic: "Фінансова звітність (P&L, Cash Flow, Баланс)",
    options: [
      { letter: "A", text: "Звіт про рух грошових коштів (CashFlow).", feedback: "Він показує фактичні надходження, але не дає деталізації щодо того, хто саме і на скільки днів затримав оплату.", correct: false },
      { letter: "B", text: "Баланс (Balance Sheet).", feedback: "Баланс показує лише загальну суму боргу на певну дату без розшифровки за термінами прострочення.", correct: false },
      { letter: "C", text: "ABC-аналіз клієнтів.", feedback: "Цей інструмент допомагає ранжувати клієнтів за обсягом прибутку або виторгу, а не за станом їхніх розрахунків.", correct: false },
      { letter: "D", text: "Звіт про старіння дебіторської заборгованості (Aging Report).", feedback: "✓ Він групує борги за термінами прострочення, дозволяючи сфокусуватися на найбільш ризикових контрагентах.", correct: true }
    ]
  },
  {
    q: "Що демонструє співвідношення LTV/CAC у юніт-економіці продукту?",
    topic: "Юніт-економіка та масштабування",
    options: [
      { letter: "A", text: "Частку маркетингових витрат у загальній структурі собівартості продукту.", feedback: "Це показник структури витрат, а не ефективності залучення та утримання клієнта.", correct: false },
      { letter: "B", text: "У скільки разів прибуток від одного клієнта за весь час перевищує витрати на його залучення.", feedback: "✓ Це ключова метрика життєздатності бізнес-моделі: якщо вона низька, масштабування лише збільшуватиме збитки.", correct: true },
      { letter: "C", text: "Швидкість, з якою клієнт здійснює повторну покупку після першого контакту.", feedback: "Це стосується показника Retention Rate або циклу покупки, а не грошового співвідношення вартості та доходу.", correct: false },
      { letter: "D", text: "Кількість нових клієнтів, яких компанія може залучити без додаткових інвестицій.", feedback: "Це опис органічного зростання, тоді як CAC завжди передбачає певні витрати на залучення.", correct: false }
    ]
  },
  {
    q: "Яке з наведених тверджень найкраще описує сутність Балансу компанії?",
    topic: "Фінансова звітність (P&L, Cash Flow, Баланс)",
    options: [
      { letter: "A", text: "Це відео транзакцій компанії, яке показує, як змінювався прибуток протягом місяця.", feedback: "Таку динаміку показує звіт P&L, тоді як Баланс є статичним «зрізом» стану на дату.", correct: false },
      { letter: "B", text: "Це перелік усіх банківських виписок, згрупованих за категоріями витрат.", feedback: "Це опис операційного грошового потоку, що є частиною звіту CashFlow.", correct: false },
      { letter: "C", text: "Це фотографія фінансового стану: що у компанії є (Активи) та за чий рахунок це придбано (Пасиви).", feedback: "✓ Баланс відображає рівновагу між ресурсами та джерелами їх формування на конкретний момент часу.", correct: true },
      { letter: "D", text: "Це документ, який містить лише інформацію про борги перед банками та податковою.", feedback: "Це лише частина пасивів (зобов'язання), але Баланс також включає власний капітал та всі ресурси компанії.", correct: false }
    ]
  },
  {
    q: "Який метод оцінки вартості бізнесу зазвичай базується на множенні показника EBITDA на певний галузевий коефіцієнт?",
    topic: "Оцінка вартості бізнесу",
    options: [
      { letter: "A", text: "Метод відтворення.", feedback: "Він розраховує, скільки коштів потрібно витратити сьогодні, щоб створити точно такий самий бізнес з нуля.", correct: false },
      { letter: "B", text: "Мультиплікаторний метод (або порівняльний).", feedback: "✓ Він дозволяє швидко оцінити ринкову вартість компанії на основі аналізу подібних угод у схожих галузях.", correct: true },
      { letter: "C", text: "Метод дисконтованих грошових потоків (DCF).", feedback: "Цей метод базується на прогнозі майбутніх грошових потоків та їх приведенні до поточної вартості, а не на поточному EBITDA.", correct: false },
      { letter: "D", text: "Метод чистих активів.", feedback: "Цей підхід оцінює бізнес як сукупність майна за вирахуванням боргів, не враховуючи здатність генерувати прибуток.", correct: false }
    ]
  },
  {
    q: "Що є головним драйвером у «Driver-based» фінансовій моделі бізнесу?",
    topic: "Фінансове моделювання та планування",
    options: [
      { letter: "A", text: "Кількість автомобілів та водіїв, що забезпечують логістику компанії.", feedback: "Це вузьке розуміння терміна; драйверами можуть бути будь-які фактори зростання, а не лише транспортні.", correct: false },
      { letter: "B", text: "План виплат за кредитами на наступні 12 місяців.", feedback: "Це частина фінансової діяльності, але не операційний важіль, що створює дохід.", correct: false },
      { letter: "C", text: "Операційні показники (кількість лідів, конверсія, середній чек), які безпосередньо впливають на фінансовий результат.", feedback: "✓ Така модель дозволяє власнику бачити, як зміна конкретного кроку в процесі вплине на чистий прибуток у майбутньому.", correct: true },
      { letter: "D", text: "Офіційний курс валют, встановлений Національним банком.", feedback: "Це зовнішній фактор ризику, а не внутрішній операційний драйвер, яким може керувати менеджмент.", correct: false }
    ]
  }
];

let current = 0;
let score = 0;
let answered = false;
let wrongTopics = [];

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qCounter').textContent = `Питання ${current + 1} / ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('btnNext').style.display = 'none';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="opt-letter">${opt.letter}</div><div class="opt-text">${opt.text}</div>`;
    div.onclick = () => selectAnswer(i);
    container.appendChild(div);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  const chosen = q.options[idx];

  opts.forEach(o => o.classList.add('disabled'));

  if (chosen.correct) {
    opts[idx].classList.add('correct');
    score++;
    showFeedback(true, chosen.feedback);
  } else {
    opts[idx].classList.add('wrong');
    // Also highlight correct
    q.options.forEach((o, i) => { if (o.correct) opts[i].classList.add('correct'); });
    if (!wrongTopics.includes(q.topic)) wrongTopics.push(q.topic);
    showFeedback(false, chosen.feedback);
  }

  document.getElementById('btnNext').style.display = 'inline-block';
}

function showFeedback(correct, text) {
  const box = document.getElementById('feedbackBox');
  const label = document.getElementById('feedbackLabel');
  const fb = document.getElementById('feedbackText');
  box.className = 'feedback-box ' + (correct ? 'correct-fb' : 'wrong-fb');
  label.textContent = correct ? '✓ Правильно!' : '✗ Не зовсім';
  fb.textContent = text;
  box.style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  document.getElementById('resScore').textContent = score;

  let headline, desc;
  const pct = score / questions.length;

  if (pct === 1) {
    headline = 'Відмінний результат! 🏆';
    desc = 'Ви впевнено орієнтуєтесь у ключових фінансових концепціях. Фінансове мислення власника бізнесу — ваша сильна сторона.';
  } else if (pct >= 0.8) {
    headline = 'Чудовий результат!';
    desc = 'Ви добре засвоїли більшість тем курсу. Зверніть увагу на теми, де були помилки — там є ще потенціал для зростання.';
  } else if (pct >= 0.6) {
    headline = 'Непоганий старт';
    desc = 'Базові концепції зрозумілі, але деякі теми варто повторити. Поверніться до матеріалів курсу по виділеним темам.';
  } else {
    headline = 'Є над чим попрацювати';
    desc = 'Фінансова грамотність — навичка, яку можна розвинути. Рекомендуємо повторно пройти відповідні модулі курсу.';
  }

  document.getElementById('resHeadline').textContent = headline;
  document.getElementById('resDesc').textContent = desc;

  // Topics breakdown
  const allTopics = [...new Set(questions.map(q => q.topic))];
  const list = document.getElementById('topicsList');
  list.innerHTML = '';
  allTopics.forEach(topic => {
    const isWrong = wrongTopics.includes(topic);
    const div = document.createElement('div');
    div.className = 'topic-item';
    div.innerHTML = `
      <div class="topic-dot ${isWrong ? 'bad' : 'ok'}"></div>
      <div style="flex:1;color:${isWrong ? '#f5b7b1' : '#a8f0c6'}">${topic}</div>
      <div style="font-size:12px;color:var(--text-muted)">${isWrong ? 'Варто повторити' : 'Засвоєно'}</div>
    `;
    list.appendChild(div);
  });
}

function retryQuiz() {
  current = 0;
  score = 0;
  answered = false;
  wrongTopics = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  loadQuestion();
}
</script>
